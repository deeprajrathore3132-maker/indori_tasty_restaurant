<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard - Indori Taste</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* BACKGROUND */
body{
background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') no-repeat center center/cover;
min-height:100vh;
display:flex;
flex-direction:column;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}

/* NAVBAR */
nav{
background:#222;
padding:15px;
position:sticky;
top:0;
z-index:1000;
}

.nav-container{
max-width:1100px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
}

.nav-links a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:18px;
}

.nav-links a:hover{color:orange;}

.admin-section{color:white;}

.logout-btn{
background:red;
border:none;
color:white;
padding:6px 12px;
border-radius:5px;
cursor:pointer;
}

/* TITLE */
.title{
text-align:center;
margin-top:40px;
color:white;
}

/* FEEDBACK BOX */
.feedback-box{
width:80%;
margin:40px auto;
background:rgba(255,255,255,0.95);
padding:20px;
border-radius:10px;
flex:1;
}

/* TABLE */
table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:orange;
color:white;
}

/* FOOTER */
footer{
background:#111;
color:white;
text-align:center;
padding:15px;
margin-top:auto;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="nav-container">

<div class="nav-links">
<a href="dashborad.html">Dashboard</a>
<a href="admin.html">All user</a>
<a href="orders.html">All orders</a>
<a href="menu-u.html">Manage Menu</a>
<a href="feedback.html">Feedback</a>
</div>

<div class="admin-section">
👨‍💼 Admin
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

</div>
</nav>

<!-- TITLE -->
<h1 class="title">Admin Dashboard - Feedback</h1>

<!-- FEEDBACK TABLE -->
<div class="feedback-box">

<h2>Customer Feedback</h2>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Rating</th>
<th>Message</th>
</tr>

<tbody id="feedbackList"></tbody>

</table>

</div>

<!-- FOOTER -->
<footer>
© 2026 Indori Tasty Restaurant | Admin Panel
</footer>

<script>

/* LOAD FEEDBACK */
fetch("/feedback")
.then(res => res.json())
.then(data => {

let table = document.getElementById("feedbackList");
table.innerHTML = "";

data.forEach(f => {

table.innerHTML += `
<tr>
<td>${f.id}</td>
<td>${f.name}</td>
<td>${f.email}</td>
<td>⭐ ${f.rating}</td>
<td>${f.message}</td>
</tr>
`;

});

})
.catch(err => console.log(err));

/* LOGOUT */
function logout(){
localStorage.clear();
window.location.href="login.html";
}

</script>

</body>
</html>
