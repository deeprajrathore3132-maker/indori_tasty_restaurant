<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indori Tasty Restaurant - Menu</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f4f4f4;}

/* NAVBAR */
nav{
background:#222;
padding:15px;
position:sticky;
top:0;
z-index:1000;
}

.nav-container{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1100px;
margin:auto;
}

.nav-links a{
color:white;
margin:0 15px;
text-decoration:none;
font-size:18px;
}

.nav-links a:hover{
color:orange;
}

.user-section{
display:flex;
align-items:center;
gap:15px;
color:white;
}

.user-info{
display:flex;
align-items:center;
gap:6px;
white-space:nowrap;
}

.user-icon{
font-size:20px;
}

.logout-btn{
background:red;
padding:6px 12px;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.logout-btn:hover{
background:darkred;
}

/* HERO */
.hero{
height:45vh;
background:url("https://images.unsplash.com/photo-1504674900247-0877df9cc836") center/cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
}

/* MENU */
.menu-container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
max-width:1100px;
margin:40px auto;
}

/* 🔥 HOVER EFFECT ADDED */
.menu-item{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:all 0.3s ease;
cursor:pointer;
}

.menu-item:hover{
transform:translateY(-10px);
box-shadow:0 15px 30px rgba(0,0,0,0.4);
border:2px solid orange;
}

.menu-item img{
width:100%;
height:160px;
object-fit:cover;
transition:0.3s;
}

.menu-item:hover img{
transform:scale(1.08);
}

.menu-content{
padding:15px;
}

.menu-item:hover .menu-content{
background:#fff7e6;
}

.price{
color:orange;
font-weight:bold;
margin:8px 0;
}

button{
width:100%;
padding:10px;
background:orange;
border:none;
color:white;
cursor:pointer;
}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:25px;
width:360px;
border-radius:10px;
text-align:center;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
}

.section{
background:#f4f4f4;
padding:10px;
margin-top:10px;
border-radius:6px;
display:none;
}

.pay-btn{
background:green;
color:white;
padding:10px;
width:100%;
border:none;
cursor:pointer;
margin-top:10px;
}

.cancel-btn{
background:red;
color:white;
padding:10px;
width:100%;
border:none;
margin-top:8px;
cursor:pointer;
}

/* FOOTER */
footer{
background:#111;
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="nav-container">

<div class="nav-links">
<a href="home.html">Home</a>
<a href="menu.html">Menu</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="Order.html">Orders</a>

</div>

<div class="user-section">
<div class="user-info">
<span class="user-icon">👤</span>
<span id="userName">User</span>
</div>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

</div>
</nav>

<!-- HERO -->
<div class="hero">
<h1>Our Delicious Menu</h1>
</div>

<!-- MENU -->
<div class="menu-container" id="menuContainer"></div>

<!-- POPUP -->
<div id="popup">
<div class="box">

<h3 id="foodName"></h3>

<input type="number" id="qty" value="1" min="1" oninput="calcTotal()">

<p>Total: ₹<span id="total">0</span></p>

<input type="text" id="address" placeholder="Address">
<input type="text" id="city" placeholder="City">
<input type="text" id="pincode" placeholder="Pincode">

<select id="mode" onchange="showUI()">
<option value="">Select Payment</option>
<option value="UPI">UPI / QR</option>
<option value="CARD">Card</option>
<option value="COD">Cash on Delivery</option>
</select>

<div class="section" id="qrBox">
<p>🔵 Scan & Pay via UPI</p>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay">
</div>

<div class="section" id="cardBox">
<input type="text" placeholder="Card Number">
<input type="text" placeholder="Name on Card">
<input type="text" placeholder="Expiry MM/YY">
<input type="text" placeholder="CVV">
</div>

<button class="pay-btn" onclick="payNow()">PAY NOW</button>
<button class="cancel-btn" onclick="closePopup()">CANCEL</button>

<p id="msg"></p>

</div>
</div>

<footer>
© 2026 Indori Tasty Restaurant | All Rights Reserved
</footer>

<script>

let currentFood="";
let currentPrice=0;
let currentTotal=0;

let userName = localStorage.getItem("userName");

document.getElementById("userName").innerText =
(userName && userName !== "undefined" && userName !== "null") ? userName : "User";

/* LOAD ALL MENU */
fetch("http://localhost:3000/admin/menu")
.then(res=>res.json())
.then(data=>{
let box=document.getElementById("menuContainer");
box.innerHTML="";

data.forEach(item=>{
box.innerHTML+=`
<div class="menu-item">
<img src="${item.image}">
<div class="menu-content">
<h3>${item.food}</h3>
<p class="price">₹${item.price}</p>
<button onclick="openOrder('${item.food}',${item.price})">Order Now</button>
</div>
</div>`;
});
});

function openOrder(food,price){
currentFood=food;
currentPrice=price;
document.getElementById("popup").style.display="flex";
calcTotal();
}

function calcTotal(){
let qty=document.getElementById("qty").value;
currentTotal = qty * currentPrice;
document.getElementById("total").innerText=currentTotal;
}

/* UI */
function showUI(){
let m=document.getElementById("mode").value;

document.getElementById("qrBox").style.display="none";
document.getElementById("cardBox").style.display="none";

if(m==="COD" && currentTotal > 500){
alert("❌ COD not available above ₹500");
document.getElementById("mode").value="";
return;
}

if(m==="UPI") document.getElementById("qrBox").style.display="block";
if(m==="CARD") document.getElementById("cardBox").style.display="block";
}

/* ✅ SAVE ORDER */
function payNow(){

let orderData = {
email: localStorage.getItem("userEmail") || "guest@gmail.com",
food: currentFood,
quantity: document.getElementById("qty").value,
total: currentTotal,
city: document.getElementById("city").value,
payment: document.getElementById("mode").value
};

fetch("http://localhost:3000/order",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify(orderData)
})
.then(res=>res.json())
.then(()=>{
alert("Order Placed ✅");
closePopup();
});

}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function logout(){
localStorage.clear();
window.location.href="login.html";
}

</script>

</body>
</html>
