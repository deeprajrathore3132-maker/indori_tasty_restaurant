<!DOCTYPE html>
<html>
<head>
<title>Admin Orders - Indori Tasty Restaurant</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* ✅ BACKGROUND IMAGE + FULL HEIGHT */
body{
background: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5') no-repeat center center/cover;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* OPTIONAL DARK OVERLAY */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}

/* NAVBAR */

nav{
background:#222;
padding:15px;
position:sticky;
top:0;
}

.nav-container{
max-width:1100px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
}

.nav-links a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:18px;
}

.nav-links a:hover{
color:orange;
}

.admin-info{
color:white;
}

.logout-btn{
background:red;
border:none;
color:white;
padding:6px 12px;
border-radius:5px;
cursor:pointer;
}

/* PAGE */

.container{
width:1100px;
margin:auto;
margin-top:40px;
background:rgba(255,255,255,0.95); /* ✅ readable */
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
flex:1; /* ✅ push footer down */
}

h2{
text-align:center;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:orange;
color:white;
}

button{
padding:5px 10px;
border:none;
background:red;
color:white;
cursor:pointer;
border-radius:5px;
}

/* ✅ FOOTER FIX */

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
margin-top:auto; /* always bottom */
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav>
<div class="nav-container">

<div class="nav-links">
<a href="dashborad.html">Dashboard</a>
<a href="admin.html">All user</a>
<a href="orders.html">All orders</a>
<a href="menu-u.html">Manage Menu</a>
<a href="menu-u.html">feedback</a>
</div>

<div class="admin-info">
👨‍💼 Admin
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

</div>
</nav>

<!-- PAGE -->

<div class="container">

<h2>Admin - All Orders</h2>

<table>

<tr>
<th>ID</th>
<th>Email</th>
<th>Food</th>
<th>Qty</th>
<th>Total</th>
<th>City</th>
<th>Payment</th>
<th>Action</th>
</tr>

<tbody id="ordersTable"></tbody>

</table>

</div>

<footer>
© 2026 Indori Tasty Restaurant | Admin Panel
</footer>

<script>

// 🔐 PROTECT PAGE
if(!localStorage.getItem("adminLoggedIn")){
  alert("Access Denied");
  window.location.href="login.html";
}

/* LOAD ORDERS */

fetch("/admin/orders")
.then(res=>res.json())
.then(data=>{

let table=document.getElementById("ordersTable");

let rows="";

data.forEach(order=>{

rows+=`
<tr>
<td>${order.id}</td>
<td>${order.email}</td>
<td>${order.food}</td>
<td>${order.quantity}</td>
<td>₹${order.total}</td>
<td>${order.city}</td>
<td>${order.payment}</td>
<td>
<button onclick="deleteOrder(${order.id})">Delete</button>
</td>
</tr>
`;

});

table.innerHTML=rows;

});

/* DELETE ORDER */

function deleteOrder(id){

if(confirm("Delete this order?")){

fetch("/admin/deleteOrder/"+id,{
method:"DELETE"
})
.then(res=>res.json())
.then(()=>{
alert("Order Deleted");
location.reload();
});

}

}

/* LOGOUT */

function logout(){
localStorage.removeItem("adminLoggedIn");
window.location.href="login.html";
}

</script>

</body>
</html>
