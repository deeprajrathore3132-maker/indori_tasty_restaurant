<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard - Indori Taste</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* BACKGROUND */
body{
background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') no-repeat center center/cover;
min-height:100vh;
display:flex;
flex-direction:column;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}

/* NAVBAR */
nav{
background:#222;
padding:15px;
position:sticky;
top:0;
z-index:1000;
}

.nav-container{
max-width:1100px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
}

.nav-links a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:18px;
}

.nav-links a:hover{
color:orange;
}

.admin-section{
color:white;
font-size:18px;
}

.logout-btn{
background:red;
border:none;
color:white;
padding:6px 12px;
border-radius:5px;
cursor:pointer;
margin-left:10px;
}

/* DASHBOARD */
.title{
text-align:center;
margin-top:40px;
color:white;
}

/* ✅ FIXED GRID LAYOUT */
.container{
margin-top:60px;
text-align: center;
gap:20px;
flex:1;
}

.card{
display:inline-block;    
background:rgba(255,255,255,0.9);
padding:30px;
margin: 20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
width:220px;
text-align:center;
}

.card h1{
color:orange;
margin-top:10px;
}

/* FOOTER */
footer{
background:#111;
color:white;
text-align:center;
padding:15px;
margin-top:auto;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="nav-container">

<div class="nav-links">
<a href="dashborad.html">Dashboard</a>
<a href="admin.html">All user</a>
<a href="orders.html">All orders</a>
<a href="menu-u.html">Manage Menu</a>
<a href="feedback.html">feedback</a>
</div>

<div class="admin-section">
👨‍💼 Admin
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

</div>
</nav>

<!-- DASHBOARD -->
<h1 class="title">Admin Dashboard</h1>

<div class="container">

<div class="card">
<h2>Total Users</h2>
<h1 id="userCount">0</h1>
</div>

<div class="card">
<h2>Total Orders</h2>
<h1 id="orderCount">0</h1>
</div>

<div class="card">
<h2>TotalFeedback</h2>
<h1 id="feedbackCount">0</h1>
</div>

<div class="card">
<h2>TotalRevenue</h2>
<h1 id="totalRevenue">₹0</h1>
</div>

</div>

<!-- FOOTER -->
<footer>
© 2026 Indori Tasty Restaurant | Admin Panel
</footer>

<script>

/* 🔐 PROTECT PAGE */
if(!localStorage.getItem("adminLoggedIn")){
  window.location.href="login.html";
}

/* LOAD STATS */
fetch("http://localhost:3000/admin/stats")
.then(res => res.json())
.then(data => {

document.getElementById("userCount").innerText = data.users || 0;
document.getElementById("orderCount").innerText = data.orders || 0;
document.getElementById("feedbackCount").innerText = data.feedback || 0;
document.getElementById("totalRevenue").innerText = "₹" + (data.revenue || 0);

})
.catch(err => console.log(err));

/* LOGOUT */
function logout(){
  localStorage.removeItem("adminLoggedIn");
  localStorage.removeItem("adminEmail");
  window.location.replace("login.html");
}

</script>

</body>
</html>
