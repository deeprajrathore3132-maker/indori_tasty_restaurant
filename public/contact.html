<!DOCTYPE html>
<html>
<head>
<title>Contact - Indori Tasty Restaurant</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* BACKGROUND */

body{
background:url("https://images.unsplash.com/photo-1555396273-367ea4eb4db5") no-repeat center center/cover;
min-height:100vh;
display:flex;
flex-direction:column;
color:white;
position:relative;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
z-index:-1;
}

/* NAVBAR */

nav{
background:#222;
padding:15px;
position:sticky;
top:0;
z-index:1000;
}

.nav-container{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1100px;
margin:auto;
}

.nav-links a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:18px;
}

.nav-links a:hover{
color:orange;
}

.user-section{
display:flex;
align-items:center;
gap:15px;
color:white;
font-size:18px;
}

.logout-btn{
background:red;
padding:6px 12px;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.logout-btn:hover{
background:darkred;
}

/* PAGE TITLE */

.title{
text-align:center;
padding:40px;
font-size:40px;
font-weight:bold;
}

/* CONTAINER */

.contact-container{
display:flex;
justify-content:center;
gap:60px;
padding:40px;
flex-wrap:wrap;
flex:1;
}

/* CONTACT BOX */

.contact-info{
background:rgba(0,0,0,0.75);
padding:40px;
border-radius:15px;
width:320px;
box-shadow:0 15px 30px rgba(0,0,0,0.5);
text-align:center;
}

.contact-info h2{
color:orange;
margin-bottom:20px;
}

.contact-info p{
margin:10px 0;
}

/* BUTTON */

.book-btn{
margin-top:20px;
padding:12px 30px;
background:orange;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.book-btn:hover{
background:#ff8800;
transform:scale(1.05);
}

/* FORM */

.contact-form{
display:none;
background:white;
color:black;
padding:35px;
border-radius:15px;
width:380px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.contact-form h2{
text-align:center;
margin-bottom:10px;
}

.contact-form input,
.contact-form textarea,
.contact-form select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
}

/* BUTTON */

.contact-form button{
width:100%;
padding:13px;
background:orange;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.contact-form button:hover{
background:#ff8800;
}

/* MAP */

.map{
text-align:center;
padding:40px;
}

iframe{
width:90%;
max-width:900px;
height:350px;
border-radius:10px;
border:none;
}

/* FOOTER */

footer{
background:#111;
text-align:center;
padding:18px;
margin-top:auto;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="nav-container">

<div class="nav-links">
<a href="home.html">Home</a>
<a href="menu.html">Menu</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="order.html">Orders</a>

</div>

<div class="user-section">
<span>👤 <span id="userName">User</span></span>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

</div>

</nav>

<div class="title">
Contact Indori Tasty Restaurant
</div>

<div class="contact-container">

<!-- CONTACT INFO -->

<div class="contact-info">

<h2>Contact Info</h2>

<p>📍 Indori Tasty Restaurant</p>
<p>123 Main Road, Indore</p>
<p>📞 +91 7007080080</p>
<p>📧 indoriTasty@email.com</p>

<button class="book-btn" onclick="showForm()">Give Feedback</button>

</div>

<!-- FEEDBACK FORM -->

<div class="contact-form" id="feedbackForm">

<h2>Customer Feedback</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="email" id="email" placeholder="Your Email">

<select id="rating">
<option value="">Rate Our Food</option>
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Good</option>
<option value="3">⭐⭐⭐ Average</option>
<option value="2">⭐⭐ Poor</option>
<option value="1">⭐ Bad</option>
</select>

<textarea rows="3" id="message" placeholder="Write your feedback"></textarea>

<button onclick="submitFeedback()">Submit Feedback</button>

</div>

</div>

<!-- MAP -->

<div class="map">

<h2>Find Us On Map</h2>

<iframe src="https://maps.google.com/maps?q=indore&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>

</div>

<footer>
 Indori Tasty Restaurant
</footer>

<script>

/* USER NAME */

let userName = localStorage.getItem("userName");

if(userName && userName !== "undefined" && userName !== "null"){
document.getElementById("userName").innerText = userName;
}else{
document.getElementById("userName").innerText = "User";
}

/* LOGOUT */

function logout(){
localStorage.clear();
alert("Logout Successful");
window.location.href="login.html";
}

/* SHOW FORM */

function showForm(){
document.getElementById("feedbackForm").style.display="block";
}

/* SUBMIT FEEDBACK */

function submitFeedback(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let rating=document.getElementById("rating").value;
let message=document.getElementById("message").value;

if(name=="" || email=="" || rating==""){
alert("Please fill all required fields");
return;
}

fetch("/feedback",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
email,
rating,
message
})

})

.then(res=>res.json())
.then(data=>{
alert("✅ Feedback Submitted ❤️");
})
.catch(()=>{
alert("Server error");
});

}

</script>

</body>
</html>
