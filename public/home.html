<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indori Tasty Restaurant</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f4f4f4;}

/* NAVBAR */
nav{
background:#222;
padding:15px;
position:sticky;
top:0;
z-index:1000;
}
.nav-container{
display:flex;
justify-content:space-between;
align-items:center;
max-width:1100px;
margin:auto;
}
.nav-links a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:18px;
}
.nav-links a:hover{color:orange;}

/* USER */
.user-section{
display:flex;
align-items:center;
gap:15px;
color:white;
font-size:18px;
}
.user-info{
display:flex;
align-items:center;
gap:6px;
white-space:nowrap;
}
.user-icon{
font-size:20px;
}
.logout-btn{
background:red;
padding:6px 12px;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}
.logout-btn:hover{background:darkred;}

/* HERO */
.hero{
height:90vh;
background:url("https://images.unsplash.com/photo-1555396273-367ea4eb4db5") center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}
.hero h1{
font-size:55px;
background:rgba(0,0,0,0.6);
padding:20px 40px;
border-radius:10px;
margin-bottom:10px;
}

/* MENU */
section{padding:70px;text-align:center;}
.menu-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
margin-top:40px;
}
.menu-item{
background:white;
width:260px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
cursor:pointer;
}
.menu-item:hover{
transform:translateY(-10px);
box-shadow:0 15px 30px rgba(0,0,0,0.4);
border:2px solid orange;
}
.menu-item img{
width:100%;
height:180px;
object-fit:cover;
}
.menu-content{padding:15px;}
.price{color:orange;font-weight:bold;margin:8px 0;}
button{
padding:10px;
background:orange;
border:none;
color:white;
width:100%;
cursor:pointer;
border-radius:5px;
}

/* POPUP */
#paymentPopup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}
.payment-box{
background:white;
padding:25px;
width:360px;
border-radius:10px;
text-align:center;
}
input,select{
width:100%;
padding:8px;
margin:6px 0;
border-radius:5px;
border:1px solid #ccc;
}
.section{
display:none;
background:#f4f4f4;
padding:10px;
margin-top:10px;
border-radius:6px;
}
.pay-btn{background:green;}
.cancel-btn{background:red;margin-top:8px;}

footer{
background:#111;
color:white;
text-align:center;
padding:15px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="nav-container">

<div class="nav-links">
<a href="home.html">Home</a>
<a href="menu.html">Menu</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="Order.html">Orders</a>
</div>

<div class="user-section">
<div class="user-info">
<span class="user-icon">👤</span>
<span id="userName">User</span>
</div>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

</div>
</nav>

<!-- HERO -->
<div class="hero">
<h1>Welcome to Indori Tasty</h1>
<p>Delicious Food • Great Taste</p>
</div>

<!-- MENU -->
<section>
<h2>Our Special Menu</h2>
<div class="menu-container" id="menuContainer"></div>
</section>

<!-- PAYMENT POPUP -->
<div id="paymentPopup">
<div class="payment-box">

<h2>Confirm Order</h2>
<h3 id="foodTitle"></h3>

<p>Total: ₹<span id="totalAmount">0</span></p>

<input type="number" id="quantity" value="1" min="1" oninput="calcTotal()">

<input type="text" placeholder="Address">
<input type="text" placeholder="City">
<input type="text" placeholder="Pincode">

<select id="paymentMethod" onchange="showPaymentUI()">
<option value="">Select Payment</option>
<option value="UPI">UPI</option>
<option value="CARD">Card</option>
<option value="COD">Cash on Delivery</option>
</select>

<!-- UPI -->
<div class="section" id="qrBox">
<p>Scan & Pay</p>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay">
</div>

<!-- CARD -->
<div class="section" id="cardBox">
<input type="text" placeholder="Card Number">
<input type="text" placeholder="Name">
<input type="text" placeholder="Expiry">
<input type="text" placeholder="CVV">
</div>

<button class="pay-btn" onclick="placeOrder()">PAY NOW</button>
<button class="cancel-btn" onclick="cancelOrder()">CANCEL</button>

</div>
</div>

<footer>Indori Tasty Restaurant</footer>

<script>

let currentFood="";
let currentPrice=0;
let totalAmount=0;

let userName = localStorage.getItem("userName");
document.getElementById("userName").innerText = userName || "User";

/* LOAD 3 MENU */
fetch("/admin/menu")
.then(res=>res.json())
.then(data=>{
let container=document.getElementById("menuContainer");
container.innerHTML="";

data.slice(0,3).forEach(item=>{
container.innerHTML+=`
<div class="menu-item">
<img src="${item.image}">
<div class="menu-content">
<h3>${item.food}</h3>
<p class="price">₹${item.price}</p>
<button onclick="openPayment('${item.food}',${item.price})">Order Now</button>
</div>
</div>`;
});
});

/* OPEN */
function openPayment(food,price){
currentFood=food;
currentPrice=price;
document.getElementById("paymentPopup").style.display="flex";
document.getElementById("foodTitle").innerText=food;
calcTotal();
}

function calcTotal(){
let qty=document.getElementById("quantity").value;
totalAmount = qty * currentPrice;
document.getElementById("totalAmount").innerText = totalAmount;
}

/* PAYMENT UI */
function showPaymentUI(){
let m=document.getElementById("paymentMethod").value;

document.getElementById("qrBox").style.display="none";
document.getElementById("cardBox").style.display="none";

if(m==="UPI") document.getElementById("qrBox").style.display="block";
if(m==="CARD") document.getElementById("cardBox").style.display="block";

if(m==="COD" && totalAmount > 500){
alert("COD not allowed above ₹500");
document.getElementById("paymentMethod").value="";
}
}

/* ✅ SAVE ORDER */
function placeOrder(){

let orderData = {
email: localStorage.getItem("userEmail") || "guest@gmail.com",
food: currentFood,
quantity: document.getElementById("quantity").value,
total: totalAmount,
city: document.querySelector("input[placeholder='City']").value,
payment: document.getElementById("paymentMethod").value
};

fetch("/order",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify(orderData)
})
.then(res=>res.json())
.then(()=>{
alert("Order Placed ✅");
cancelOrder();
});

}

function cancelOrder(){
document.getElementById("paymentPopup").style.display="none";
}

function logout(){
localStorage.clear();
location.href="login.html";
}

</script>

</body>
</html>
